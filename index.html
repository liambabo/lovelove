<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페어 정리틀</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --main: #f9d7e3;
    --main-light: #fdeef3;
    --main-dark: #e8a8c0;
    --accent: #d4537e;
    --bg: #fff8fa;
    --card: #ffffff;
    --text: #5a4a52;
    --text-soft: #a98a98;
    --imessage-bubble: #ffd9e8;
    --imessage-other: #f0f0f2;
    --radius: 18px;
    --font: 'Gowun Dodum', 'Noto Sans KR', sans-serif;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }

  .toolbar{
    max-width: 1300px;
    margin: 0 auto 16px;
    background: var(--card);
    border: 1px solid var(--main);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
    font-size: 13px;
  }

  .toolbar h1{
    font-size: 16px;
    margin: 0;
    color: var(--accent);
    margin-right: 8px;
  }

  .toolbar label{
    display:flex;
    align-items:center;
    gap:6px;
    color: var(--text-soft);
  }

  .toolbar input[type="color"]{
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 50%;
    padding: 0;
    cursor: pointer;
    background: none;
  }

  .toolbar button{
    border: 1px solid var(--main-dark);
    background: var(--main-light);
    color: var(--accent);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
  }
  .toolbar button:hover{ background: var(--main); }

  /* ===== Main layout: 3:2 ratio, wide ===== */
  .frame{
    max-width: 1300px;
    margin: 0 auto;
    aspect-ratio: 3 / 2;
    background: var(--card);
    border-radius: 24px;
    border: 1px solid var(--main);
    overflow: hidden;
    display: grid;
    grid-template-columns: 1.55fr 1fr;
    gap: 0;
  }

  @media (max-width: 900px){
    .frame{ aspect-ratio: auto; grid-template-columns: 1fr; }
  }

  /* ===== Left: timeline area ===== */
  .timeline-area{
    background: linear-gradient(180deg, var(--main-light) 0%, #ffffff 60%);
    padding: 26px 30px;
    overflow-y: auto;
    border-right: 1px solid var(--main);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* Pair header (couple image banner + names) */
  .pair-header{
    display:flex;
    flex-direction: column;
    gap: 0;
    margin: -26px -30px 0;
    border-bottom: 2px dashed var(--main-dark);
  }

  .couple-banner{
    width: 100%;
    height: 150px;
    background: var(--main-light);
    border-bottom: 3px solid var(--main);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
    cursor:pointer;
    position: relative;
    font-size: 13px;
    color: var(--text-soft);
    text-align:center;
    line-height:1.5;
  }
  .couple-banner img{ width:100%; height:100%; object-fit:cover; }

  .pair-header-info{
    display:flex;
    align-items:center;
    gap: 16px;
    padding: 14px 30px;
  }

  .pair-photo{
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: var(--main-light);
    border: 3px solid var(--main);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
    cursor:pointer;
    position: relative;
    font-size: 11px;
    color: var(--text-soft);
    text-align:center;
    line-height:1.3;
  }
  .pair-photo img{ width:100%; height:100%; object-fit:cover; }
  .pair-photo.small{ width: 56px; height:56px; font-size:9px; }

  .pair-names{
    display:flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .pair-names .ship-name{
    font-size: 22px;
    font-weight: bold;
    color: var(--accent);
    outline: none;
  }

  .pair-names .ship-sub{
    font-size: 13px;
    color: var(--text-soft);
    outline: none;
  }

  .char-thumbs{
    display:flex;
    gap: 10px;
    flex-shrink:0;
  }
  .char-thumbs .pair-photo{ width: 56px; height:56px; font-size:9px; border-width:2px;}

  /* timeline title */
  .timeline-title{
    font-size: 17px;
    color: var(--accent);
    font-weight: bold;
    display:flex;
    align-items:center;
    gap:8px;
    outline:none;
  }
  .timeline-title::before{ content:"♡"; }

  /* timeline steps */
  .timeline{
    position: relative;
    padding-left: 26px;
  }
  .timeline::before{
    content:"";
    position:absolute;
    left:9px;
    top:6px;
    bottom:6px;
    width: 2px;
    background: var(--main-dark);
    border-radius:2px;
  }

  .tl-step{
    position: relative;
    margin-bottom: 20px;
  }
  .tl-step:last-child{ margin-bottom: 4px; }

  .tl-step::before{
    content:"";
    position:absolute;
    left: -26px;
    top: 4px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--main);
    border: 2px solid var(--accent);
  }

  .tl-step .tl-label{
    font-size: 12px;
    color: var(--accent);
    font-weight: bold;
    margin-bottom: 4px;
    outline:none;
  }

  .tl-step .tl-content{
    background: var(--card);
    border: 1px solid var(--main);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 13.5px;
    line-height: 1.7;
    outline:none;
    min-height: 20px;
  }
  .tl-step .tl-content:empty::before{
    content: attr(data-placeholder);
    color: var(--text-soft);
  }

  /* ===== Right: messenger area ===== */
  .messenger-area{
    background: #ffffff;
    display:flex;
    flex-direction: column;
    height: 100%;
  }

  .imessage-header{
    padding: 14px 16px 10px;
    border-bottom: 1px solid #e5e5ea;
    display:flex;
    align-items:center;
    gap: 10px;
    background: #fafafa;
  }
  .imessage-header .avatars{
    display:flex;
  }
  .imessage-header .avatars .pair-photo{
    width: 36px; height:36px; font-size:8px; border-width:2px;
  }
  .imessage-header .avatars .pair-photo:nth-child(2){
    margin-left: -12px;
    border-color: var(--main-light);
  }
  .imessage-header .chat-title{
    font-size: 13px;
    font-weight: bold;
    color: var(--text);
    outline:none;
  }
  .imessage-header .chat-sub{
    font-size: 11px;
    color: var(--text-soft);
    outline:none;
  }

  .imessage-body{
    flex: 1;
    padding: 16px 14px;
    display:flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    background: #ffffff;
  }

  .imsg-date{
    text-align:center;
    font-size: 11px;
    color: var(--text-soft);
    margin: 6px 0 10px;
    position: relative;
  }
  .imsg-date .date-text{ outline: none; }

  .bubble-row{
    display:flex;
    flex-direction: column;
    max-width: 75%;
    position: relative;
  }
  .bubble-row.left{ align-self: flex-start; align-items: flex-start; }
  .bubble-row.right{ align-self: flex-end; align-items: flex-end; }

  .msg-remove{
    position:absolute;
    top: -2px;
    font-size: 10px;
    color: var(--main-dark);
    cursor:pointer;
    background:none;
    border:none;
    opacity: 0;
    transition: opacity .15s;
  }
  .bubble-row:hover .msg-remove{ opacity: 1; }
  .bubble-row.left .msg-remove{ right: -22px; }
  .bubble-row.right .msg-remove{ left: -22px; }

  .date-remove{
    position:absolute;
    right: -22px;
    top: 0;
    font-size: 10px;
    color: var(--main-dark);
    cursor:pointer;
    background:none;
    border:none;
    opacity: 0;
    transition: opacity .15s;
  }
  .imsg-date:hover .date-remove{ opacity: 1; }

  .bubble{
    padding: 8px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.45;
    outline: none;
    word-break: break-word;
  }
  .bubble-row.left .bubble{
    background: var(--imessage-other);
    color: #1c1c1e;
    border-bottom-left-radius: 4px;
  }
  .bubble-row.right .bubble{
    background: var(--imessage-bubble);
    color: #3a2030;
    border-bottom-right-radius: 4px;
  }

  .bubble-row + .bubble-row.left,
  .bubble-row + .bubble-row.right{
    margin-top: -2px;
  }

  .read-status{
    font-size: 10px;
    color: var(--text-soft);
    margin: 3px 4px 0;
    outline: none;
    cursor: pointer;
  }

  .imessage-inputbar{
    border-top: 1px solid #e5e5ea;
    padding: 10px 12px;
    display:flex;
    align-items:center;
    gap: 8px;
    background: #fafafa;
  }
  .imessage-inputbar .fake-input{
    flex:1;
    border: 1px solid #d8d8dc;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text-soft);
    background:#fff;
  }
  .imessage-inputbar .send-icon{
    width: 28px; height:28px;
    border-radius:50%;
    background: var(--accent);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 14px;
  }

  /* message control buttons */
  .msg-controls{
    padding: 8px 12px;
    border-top: 1px dashed var(--main);
    display:flex;
    gap:8px;
    flex-wrap: wrap;
    background: var(--main-light);
  }
  .msg-controls button{
    font-size: 11px;
    border:1px solid var(--main-dark);
    background:#fff;
    color: var(--accent);
    border-radius: 999px;
    padding: 5px 10px;
    cursor:pointer;
    font-family: var(--font);
  }
  .msg-controls button:hover{ background: var(--main-light); }

  .add-step-btn{
    align-self: center;
    border: 1px dashed var(--main-dark);
    background: transparent;
    color: var(--accent);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    margin-top: 4px;
  }
  .add-step-btn:hover{ background: var(--main-light); }

  .step-remove{
    position:absolute;
    right: 6px;
    top: 6px;
    font-size: 11px;
    color: var(--main-dark);
    cursor:pointer;
    background:none;
    border:none;
  }
  .tl-step{ position:relative; }
  .tl-step .tl-content{ position:relative; padding-right: 24px; }

  ::placeholder{ color: var(--text-soft); }

  [contenteditable="true"]:hover{
    background: rgba(249,215,227,0.25);
    border-radius: 4px;
  }
  [contenteditable="true"]:focus{
    background: rgba(249,215,227,0.45);
    border-radius: 4px;
  }

  .photo-hint{
    font-size: 22px;
    color: var(--main-dark);
  }

  .pair-photo .photo-hint{ font-size: 20px; }

  /* 이미지 저장 시 편집 UI 숨김 */
  .capture-mode .step-remove,
  .capture-mode .msg-remove,
  .capture-mode .date-remove,
  .capture-mode .add-step-btn,
  .capture-mode .msg-controls{
    display: none !important;
  }
  .capture-mode [contenteditable="true"]:hover,
  .capture-mode [contenteditable="true"]:focus{
    background: transparent !important;
  }
  .capture-mode .tl-step .tl-content{
    padding-right: 14px;
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>♡ 페어 정리틀</h1>
  <label>메인 색상 <input type="color" id="colorMain" value="#f9d7e3"></label>
  <label>강조 색상 <input type="color" id="colorAccent" value="#d4537e"></label>
  <label>메신저 말풍선(나) <input type="color" id="colorMyBubble" value="#ffd9e8"></label>
  <button id="resetColors">색상 초기화</button>
  <button id="saveImageBtn">📷 이미지로 저장</button>
  <span style="color:var(--text-soft); font-size:12px; margin-left:auto;">
    텍스트와 이미지를 클릭해서 자유롭게 편집하세요 ✏️
  </span>
</div>

<div class="frame">
  <!-- LEFT: TIMELINE -->
  <div class="timeline-area">

    <div class="pair-header">
      <div class="couple-banner" id="couplePhoto" onclick="triggerUpload(this)">
        <span class="photo-hint">♡ 커플컷 배너 (클릭해서 이미지 업로드)</span>
        <input type="file" accept="image/*" style="display:none">
      </div>
      <div class="pair-header-info">
        <div class="pair-names">
          <div class="ship-name" contenteditable="true">캐릭터A ✕ 캐릭터B</div>
          <div class="ship-sub" contenteditable="true">한 줄 소개 / 관계 설명을 적어주세요</div>
        </div>
        <div class="char-thumbs">
          <div class="pair-photo" onclick="triggerUpload(this)">
            <span class="photo-hint">A</span>
            <input type="file" accept="image/*" style="display:none">
          </div>
          <div class="pair-photo" onclick="triggerUpload(this)">
            <span class="photo-hint">B</span>
            <input type="file" accept="image/*" style="display:none">
          </div>
        </div>
      </div>
    </div>

    <div class="timeline-title" contenteditable="true">페어 서사 타임라인</div>

    <div class="timeline" id="timelineList">
      <div class="tl-step">
        <div class="tl-label" contenteditable="true">STEP 1. 첫 만남</div>
        <div class="tl-content" contenteditable="true" data-placeholder="내용을 입력해주세요"></div>
        <button class="step-remove" onclick="removeStep(this)">✕</button>
      </div>
      <div class="tl-step">
        <div class="tl-label" contenteditable="true">STEP 2. 가까워지는 계기</div>
        <div class="tl-content" contenteditable="true" data-placeholder="내용을 입력해주세요"></div>
        <button class="step-remove" onclick="removeStep(this)">✕</button>
      </div>
      <div class="tl-step">
        <div class="tl-label" contenteditable="true">STEP 3. 갈등 / 위기</div>
        <div class="tl-content" contenteditable="true" data-placeholder="내용을 입력해주세요"></div>
        <button class="step-remove" onclick="removeStep(this)">✕</button>
      </div>
      <div class="tl-step">
        <div class="tl-label" contenteditable="true">STEP 4. 화해 / 변화</div>
        <div class="tl-content" contenteditable="true" data-placeholder="내용을 입력해주세요"></div>
        <button class="step-remove" onclick="removeStep(this)">✕</button>
      </div>
      <div class="tl-step">
        <div class="tl-label" contenteditable="true">STEP 5. 현재 / 결말</div>
        <div class="tl-content" contenteditable="true" data-placeholder="내용을 입력해주세요"></div>
        <button class="step-remove" onclick="removeStep(this)">✕</button>
      </div>
    </div>

    <button class="add-step-btn" onclick="addStep()">+ 단계 추가</button>
  </div>

  <!-- RIGHT: iMESSAGE STYLE MESSENGER -->
  <div class="messenger-area">
    <div class="imessage-header">
      <div class="avatars">
        <div class="pair-photo small" onclick="triggerUpload(this)">
          <span class="photo-hint" style="font-size:14px;">A</span>
          <input type="file" accept="image/*" style="display:none">
        </div>
        <div class="pair-photo small" onclick="triggerUpload(this)">
          <span class="photo-hint" style="font-size:14px;">B</span>
          <input type="file" accept="image/*" style="display:none">
        </div>
      </div>
      <div>
        <div class="chat-title" contenteditable="true">캐릭터A, 캐릭터B</div>
        <div class="chat-sub" contenteditable="true">메신저 대화 제목 / 설명</div>
      </div>
    </div>

    <div class="imessage-body" id="msgBody">
      <div class="imsg-date">
        <span class="date-text" contenteditable="true">오늘 오후 9:14</span>
        <button class="date-remove" onclick="removeNode(this)">✕</button>
      </div>

      <div class="bubble-row left">
        <div class="bubble" contenteditable="true">오늘 뭐해?</div>
        <button class="msg-remove" onclick="removeNode(this)">✕</button>
      </div>

      <div class="bubble-row right">
        <div class="bubble" contenteditable="true">너 생각 중이었어 ㅎㅎ</div>
        <button class="msg-remove" onclick="removeNode(this)">✕</button>
      </div>

      <div class="bubble-row left">
        <div class="bubble" contenteditable="true">진짜? 보고싶다</div>
        <button class="msg-remove" onclick="removeNode(this)">✕</button>
      </div>

      <div class="bubble-row right">
        <div class="bubble" contenteditable="true">나도 ♡</div>
        <div class="read-status" contenteditable="true">읽음</div>
        <button class="msg-remove" onclick="removeNode(this)">✕</button>
      </div>
    </div>

    <div class="msg-controls">
      <button onclick="addBubble('left')">+ A 말풍선</button>
      <button onclick="addBubble('right')">+ B 말풍선</button>
      <button onclick="addDate()">+ 날짜 구분선</button>
    </div>

    <div class="imessage-inputbar">
      <div class="fake-input">iMessage</div>
      <div class="send-icon">↑</div>
    </div>
  </div>
</div>

<script>
function triggerUpload(el){
  const input = el.querySelector('input[type="file"]');
  input.click();
  input.onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      el.innerHTML = `<img src="${ev.target.result}" alt="photo">`;
    };
    reader.readAsDataURL(file);
  };
}

function addStep(){
  const list = document.getElementById('timelineList');
  const div = document.createElement('div');
  div.className = 'tl-step';
  div.innerHTML = `
    <div class="tl-label" contenteditable="true">새 단계</div>
    <div class="tl-content" contenteditable="true" data-placeholder="내용을 입력해주세요"></div>
    <button class="step-remove" onclick="removeStep(this)">✕</button>
  `;
  list.appendChild(div);
}

function removeStep(btn){
  btn.closest('.tl-step').remove();
}

function addBubble(side){
  const body = document.getElementById('msgBody');
  const row = document.createElement('div');
  row.className = `bubble-row ${side}`;
  row.innerHTML = `
    <div class="bubble" contenteditable="true">새 메시지</div>
    <button class="msg-remove" onclick="removeNode(this)">✕</button>
  `;
  body.appendChild(row);
  if(side === 'right'){
    refreshReadStatus();
  }
  body.scrollTop = body.scrollHeight;
}

function addDate(){
  const body = document.getElementById('msgBody');
  const el = document.createElement('div');
  el.className = 'imsg-date';
  el.innerHTML = `
    <span class="date-text" contenteditable="true">날짜 / 시간</span>
    <button class="date-remove" onclick="removeNode(this)">✕</button>
  `;
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;
}

function removeNode(btn){
  const row = btn.closest('.bubble-row') || btn.closest('.imsg-date');
  const wasRight = row.classList && row.classList.contains('right');
  row.remove();
  if(wasRight){ refreshReadStatus(); }
}

/* 읽음/안읽음 표시는 B(우측)의 가장 마지막 말풍선 아래에만 표시 */
function refreshReadStatus(){
  const body = document.getElementById('msgBody');
  // 기존 읽음 표시 모두 제거
  body.querySelectorAll('.read-status').forEach(el => el.remove());
  // 가장 마지막 right bubble-row 찾기
  const rightRows = body.querySelectorAll('.bubble-row.right');
  if(rightRows.length === 0) return;
  const lastRight = rightRows[rightRows.length - 1];
  const status = document.createElement('div');
  status.className = 'read-status';
  status.contentEditable = 'true';
  status.textContent = '읽음';
  status.title = '클릭해서 "읽음" / "안읽음" 등으로 수정하세요';
  // 삭제 버튼 앞에 삽입
  const removeBtn = lastRight.querySelector('.msg-remove');
  lastRight.insertBefore(status, removeBtn);
}

/* Color customization */
const root = document.documentElement.style;
const defaults = { main:'#f9d7e3', accent:'#d4537e', myBubble:'#ffd9e8' };

function hexToRgb(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function lighten(hex, amt){
  const {r,g,b} = hexToRgb(hex);
  const nr = Math.min(255, r + amt);
  const ng = Math.min(255, g + amt);
  const nb = Math.min(255, b + amt);
  return `rgb(${nr},${ng},${nb})`;
}
function darken(hex, amt){
  const {r,g,b} = hexToRgb(hex);
  const nr = Math.max(0, r - amt);
  const ng = Math.max(0, g - amt);
  const nb = Math.max(0, b - amt);
  return `rgb(${nr},${ng},${nb})`;
}

document.getElementById('colorMain').addEventListener('input', (e)=>{
  const val = e.target.value;
  root.setProperty('--main', val);
  root.setProperty('--main-light', lighten(val, 20));
  root.setProperty('--main-dark', darken(val, 30));
});

document.getElementById('colorAccent').addEventListener('input', (e)=>{
  root.setProperty('--accent', e.target.value);
});

document.getElementById('colorMyBubble').addEventListener('input', (e)=>{
  root.setProperty('--imessage-bubble', e.target.value);
});

document.getElementById('resetColors').addEventListener('click', ()=>{
  root.removeProperty('--main');
  root.removeProperty('--main-light');
  root.removeProperty('--main-dark');
  root.removeProperty('--accent');
  root.removeProperty('--imessage-bubble');
  document.getElementById('colorMain').value = defaults.main;
  document.getElementById('colorAccent').value = defaults.accent;
  document.getElementById('colorMyBubble').value = defaults.myBubble;
});

/* 초기 정합성 보장 */
refreshReadStatus();

/* 이미지로 저장 */
document.getElementById('saveImageBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('saveImageBtn');
  const original = btn.textContent;
  btn.textContent = '저장 중...';
  btn.disabled = true;

  const frame = document.querySelector('.frame');
  frame.classList.add('capture-mode');

  try{
    const canvas = await html2canvas(frame, {
      backgroundColor: '#ffffff',
      scale: 2,
      useCORS: true
    });
    const link = document.createElement('a');
    link.download = '페어_정리틀.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }catch(err){
    alert('이미지 저장 중 오류가 발생했습니다: ' + err.message);
  }finally{
    frame.classList.remove('capture-mode');
    btn.textContent = original;
    btn.disabled = false;
  }
});
</script>
